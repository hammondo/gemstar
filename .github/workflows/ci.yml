name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-skelly-server:
    name: Type-check server
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: skelly/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skelly/server/package-lock.json
      - run: npm ci && npm --prefix server ci && npm --prefix dashboard ci
      - run: npm run lint

  check-skelly-dashboard:
    name: Type-check dashboard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: skelly/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skelly/dashboard/package-lock.json
      - run: npm ci
      - run: npx tsc -b --noEmit

  check-website:
    name: Type-check website
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
